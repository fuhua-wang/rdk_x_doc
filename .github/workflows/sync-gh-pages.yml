name: Sync gh-pages to OSS

on:
  workflow_run:
    workflows: ["Deploy Docusaurus site to GitHub Pages"]
    types:
      - completed
  workflow_dispatch:

jobs:
  sync-gh-pages:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Setup ossutil v2
        run: |
          curl -o ossutil.zip https://gosspublic.alicdn.com/ossutil/v2/2.1.2/ossutil-2.1.2-linux-amd64.zip
          unzip ossutil.zip
          cd ossutil-2.1.2-linux-amd64
          chmod 755 ossutil
          mv ossutil ~/ossutil

      - name: Upload to OSS via Custom Domain
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          ~/ossutil cp -r . oss://cn-rdk-front-prod/rdk_x_doc/ \
          -e https://d-robotics.cc \
          -i $OSS_ACCESS_KEY_ID \
          -k $OSS_ACCESS_KEY_SECRET \
          --region cn-beijing \
          --update \
          --retry-times=3